<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="outer-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.39  0 0 0 0 0.4  0 0 0 0 0.95  0 0 0 0.6 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="inner-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.55  0 0 0 0 0.36  0 0 0 0 0.98  0 0 0 0.5 0"/>
    </filter>
    <radialGradient id="orb-glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg-grad)"/>

  <!-- Subtle ambient glow behind the icon -->
  <circle cx="256" cy="240" r="160" fill="url(#orb-glow)"/>

  <!-- Outer hexagonal portal shape -->
  <g filter="url(#outer-glow)">
    <path d="M256 100 L370 166 L370 298 L256 364 L142 298 L142 166 Z"
          fill="none" stroke="url(#accent)" stroke-width="6" stroke-linejoin="round" opacity="0.3"/>
  </g>

  <!-- Middle hexagonal ring -->
  <path d="M256 130 L352 186 L352 280 L256 336 L160 280 L160 186 Z"
        fill="none" stroke="url(#accent)" stroke-width="3" stroke-linejoin="round" opacity="0.15"/>

  <!-- Inner hexagonal portal frame -->
  <path d="M256 148 L340 196 L340 272 L256 320 L172 272 L172 196 Z"
        fill="none" stroke="url(#accent)" stroke-width="4" stroke-linejoin="round" opacity="0.7"/>

  <!-- Central orb with glow -->
  <circle cx="256" cy="234" r="42" fill="url(#glow)" opacity="0.9"/>
  <circle cx="256" cy="234" r="42" fill="none" stroke="#c4b5fd" stroke-width="2" opacity="0.4"/>

  <!-- Highlight on orb -->
  <ellipse cx="246" cy="222" rx="16" ry="10" fill="white" opacity="0.2"/>

  <!-- Connection lines from orb to hex vertices — data flow effect -->
  <line x1="256" y1="192" x2="256" y2="148" stroke="url(#accent)" stroke-width="2" opacity="0.4" stroke-dasharray="4 6"/>
  <line x1="292" y1="214" x2="340" y2="196" stroke="url(#accent)" stroke-width="2" opacity="0.3" stroke-dasharray="4 6"/>
  <line x1="220" y1="214" x2="172" y2="196" stroke="url(#accent)" stroke-width="2" opacity="0.3" stroke-dasharray="4 6"/>
  <line x1="292" y1="254" x2="340" y2="272" stroke="url(#accent)" stroke-width="2" opacity="0.3" stroke-dasharray="4 6"/>
  <line x1="220" y1="254" x2="172" y2="272" stroke="url(#accent)" stroke-width="2" opacity="0.3" stroke-dasharray="4 6"/>
  <line x1="256" y1="276" x2="256" y2="320" stroke="url(#accent)" stroke-width="2" opacity="0.4" stroke-dasharray="4 6"/>

  <!-- Small satellite dots at hex vertices -->
  <circle cx="256" cy="148" r="5" fill="#818cf8" opacity="0.8"/>
  <circle cx="340" cy="196" r="4" fill="#a78bfa" opacity="0.6"/>
  <circle cx="340" cy="272" r="4" fill="#a78bfa" opacity="0.6"/>
  <circle cx="256" cy="320" r="5" fill="#c084fc" opacity="0.8"/>
  <circle cx="172" cy="272" r="4" fill="#a78bfa" opacity="0.6"/>
  <circle cx="172" cy="196" r="4" fill="#a78bfa" opacity="0.6"/>

  <!-- "CP" text — Claude Portal -->
  <text x="256" y="396" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="48" fill="url(#accent)" letter-spacing="8" opacity="0.85">CP</text>

  <!-- Subtle bottom accent line -->
  <line x1="196" y1="420" x2="316" y2="420" stroke="url(#accent)" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
</svg>
