services:
  portal:
    build:
      context: ./portal
      dockerfile: Dockerfile.dev
    container_name: claude-portal-dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://portal:${POSTGRES_PASSWORD:-portal}@postgres:5432/claude_portal
      - REDIS_URL=redis://redis:6379
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - CLAUDE_HOME=/claude-config
      - NODE_ENV=development
    volumes:
      - ${CLAUDE_HOME:-~/.claude}:/claude-config:ro
      - ./portal/src:/app/src
      - ./portal/public:/app/public
      - ./portal/prisma:/app/prisma
    ports:
      - "3000:3000"
    networks:
      - portal-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  postgres:
    image: postgres:16-alpine
    container_name: claude-portal-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=portal
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-portal}
      - POSTGRES_DB=claude_portal
    volumes:
      - portal_pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - portal-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal -d claude_portal"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: claude-portal-redis
    restart: unless-stopped
    volumes:
      - portal_redisdata:/data
    ports:
      - "6380:6379"
    networks:
      - portal-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  portal_pgdata:
  portal_redisdata:

networks:
  portal-net:
    driver: bridge
